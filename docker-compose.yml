services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-drivium}
      POSTGRES_USER: ${POSTGRES_USER:-drivium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drivium}
    volumes:
      - postgres_data_v15:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-drivium} -d ${POSTGRES_DB:-drivium}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadminsecret}
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PROJECT_NAME: Drivium
      PROJECT_DESCRIPTION: Google Drive clone
      DEBUG: "False"
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-drivium}:${POSTGRES_PASSWORD:-drivium}@postgres:5432/${POSTGRES_DB:-drivium}
      SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadminsecret}
      MINIO_BUCKET_NAME: drivium
      MINIO_SECURE: "false"
      MINIO_PUBLIC_PREFIX: /storage
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-/api}
        TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: 0.0.0.0
      ORIGIN: ${APP_ORIGIN:-http://localhost}
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      PORT_HEADER: x-forwarded-port
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-/api}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - minio
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data_v15:
  minio_data:
